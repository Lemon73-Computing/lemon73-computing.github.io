{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="info-card">
    {{ range .Pages }}
      <a href="{{ .Permalink }}">
        <p id="info-date">{{ .Date.Format "2006.01.02" }}</p>
        <p id="info-title">{{ .Title }}</p>
        <p id="info-summary">{{ .Summary | plainify }}…</p>
      </a>
    {{ end }}
  </div>
{{ end }}
